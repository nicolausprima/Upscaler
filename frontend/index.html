<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upscaler</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <!-- Vibrant mesh gradient background for glass effect -->
    <div class="bg-mesh"></div>

    <header class="header">
        <h1>Upscaler</h1>
        <p class="subtitle">AI Image Enhancement</p>
    </header>

    <div class="container">
        <!-- Main Card -->
        <main class="card">
            <!-- Upload Area -->
            <div class="upload-area" id="dropZone">
                <input type="file" id="fileInput" accept="image/*" hidden>
                <div id="uploadPrompt">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    <p class="upload-text">Pilih atau letakkan gambar</p>
                    <p class="upload-hint">Format didukung: JPG, PNG, WEBP</p>
                </div>
                <img id="previewImg" alt="Preview">
            </div>
            
            <button class="reset-btn" id="resetBtn" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
                Pilih Gambar Lain
            </button>

            <!-- Controls -->
            <div class="form-group">
                <div class="label">Skala Resolusi</div>
                <div class="segmented-control" id="scaleSelector">
                    <div class="segment-indicator"></div>
                    <button class="segment-btn" data-scale="2" type="button">2x Scale</button>
                    <button class="segment-btn active" data-scale="4" type="button">4x Scale</button>
                </div>
            </div>

            <div class="form-group">
                <div class="label">
                    <span>Intensitas AI</span>
                    <span class="label-value" id="strengthValue">80%</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="strengthSlider" class="range-slider" min="0" max="100" value="80" step="5">
                    <div class="slider-labels">
                        <span>Original</span>
                        <span>Enhanced</span>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button class="btn-primary" id="processBtn" disabled type="button">
                Tingkatkan Resolusi
            </button>

            <!-- Loading State -->
            <div class="loading-indicator" id="loadingSection">
                <div class="spinner"></div>
                <p class="loading-text">Memproses gambar...</p>
            </div>
        </main>

        <!-- Result Card -->
        <section class="card result-section" id="resultSection">
            <div class="result-header">
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                Selesai
            </div>

            <!-- Metadata Grid -->
            <div class="meta-grid" id="metaRow">
                <!-- Injected via JS -->
            </div>

            <!-- Comparison -->
            <div class="comparison-wrapper">
                <div class="comparison-container" id="comparisonContainer">
                    <img id="beforeImg" alt="Original">
                    <div class="comparison-after" id="comparisonAfter">
                        <img id="afterImg" alt="Enhanced">
                    </div>
                    <div class="slider-line" id="comparisonSliderLine"></div>
                    <div class="slider-handle" id="comparisonSliderHandle"></div>
                    <span class="badge badge-left">Before</span>
                    <span class="badge badge-right">After</span>
                </div>
            </div>

            <!-- Download -->
            <a href="#" class="btn-secondary" id="downloadBtn" download="upscaled.jpg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Unduh Gambar
            </a>
        </section>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
