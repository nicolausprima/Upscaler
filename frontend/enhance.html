<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Enhancer</title>
    <meta name="description" content="Perbaiki ketajaman foto secara instan dengan Sharpen dan Deblur">
    <link rel="stylesheet" href="style.css?v=17">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div class="bg-mesh"></div>

    <header class="header">
        <h1>Enhancer</h1>
        <p class="subtitle">Sharpen &amp; Deblur Instan</p>

        <nav class="app-nav">
            <a href="/" class="nav-btn">AI Upscaler</a>
            <a href="/enhance.html" class="nav-btn active">Photo Enhancer</a>
        </nav>
    </header>

    <div class="container">
        <!-- Main Card -->
        <main class="card">
            <!-- Upload Area -->
            <div class="upload-area" id="dropZone">
                <input type="file" id="fileInput" accept="image/*" hidden multiple>
                <div id="uploadPrompt">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </div>
                    <p class="upload-text">Pilih atau letakkan gambar</p>
                    <p class="upload-hint">Format: JPG, PNG, WEBP &bull; Pilih banyak sekaligus</p>
                </div>
                <img id="previewImg" alt="Preview">
                <div id="multiPreviewGrid" style="display:none;"></div>
            </div>

            <button class="reset-btn" id="resetBtn" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
                Pilih Gambar Lain
            </button>

            <!-- Controls -->
            <div class="form-group">
                <div class="label">Pilih Efek</div>
                <div class="segmented-control" id="effectSelector">
                    <div class="segment-indicator" style="width: calc(33.333% - 4px); transform: translateX(100%);"></div>
                    <button class="segment-btn" data-effect="none" type="button">Tidak Ada</button>
                    <button class="segment-btn active" data-effect="sharpen" type="button">Pertajam</button>
                    <button class="segment-btn" data-effect="deblur" type="button">Kurangi Blur</button>
                </div>
            </div>

            <div class="form-group" id="intensityGroup">
                <div class="label">
                    <span id="intensityLabel">Ketajaman</span>
                    <span class="label-value" id="intensityValue">50%</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="intensitySlider" class="range-slider" min="0" max="100" value="50" step="1">
                    <div class="slider-labels">
                        <span>Halus</span>
                        <span>Kuat</span>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button class="btn-primary" id="processBtn" disabled type="button">
                Terapkan Efek
            </button>

            <!-- Loading State -->
            <div class="loading-indicator" id="loadingSection">
                <div class="spinner"></div>
                <p class="loading-text" id="loadingText">Memproses gambar...</p>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </main>

        <!-- Result Card -->
        <section class="card result-section" id="resultSection">
            <div class="result-header">
                <div class="status-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                Selesai
            </div>

            <!-- Metadata Grid -->
            <div class="meta-grid" id="metaRow">
                <!-- Injected via JS -->
            </div>

            <!-- Comparison -->
            <div class="comparison-wrapper">
                <div class="comparison-container" id="comparisonContainer">
                    <div class="zoom-layer" id="zoomLayer">
                        <img id="beforeImg" alt="Original">
                        <div class="comparison-after" id="comparisonAfter">
                            <img id="afterImg" alt="Enhanced">
                        </div>
                    </div>
                    <div class="slider-line" id="comparisonSliderLine"></div>
                    <div class="slider-handle" id="comparisonSliderHandle"></div>
                    <span class="badge badge-left">Before</span>
                    <span class="badge badge-right">After</span>
                    <button class="zoom-reset-btn" id="zoomResetBtn" style="display:none" title="Lihat foto penuh">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        Foto Penuh
                    </button>
                </div>
            </div>

            <div id="featureHighlights" class="highlights-container">
                <!-- Highlight buttons injected via JS -->
            </div>

            <!-- Download single -->
            <a href="#" class="btn-secondary" id="downloadBtn" download="enhanced.jpg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Unduh Gambar
            </a>
        </section>

        <!-- ===== BATCH CARD ===== -->
        <section class="card batch-section" id="batchSection" style="display:none;">
            <div class="batch-header">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                Antrian Batch
                <span class="batch-counter" id="batchCounter">0 / 0</span>
            </div>

            <div class="batch-queue" id="batchQueue">
                <!-- Injected via JS -->
            </div>

            <button class="btn-zip" id="downloadZipBtn" style="display:none" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Unduh Semua (ZIP)
            </button>
        </section>
    </div>

    <script src="enhance.js?v=5"></script>
</body>
</html>
